description: >-
  Distroless images by Google contain only the application and its runtime
  dependencies, stripping out package managers, shells, and other OS-level
  utilities to minimize attack surface and image size. The smallest variant
  (gcr.io/distroless/static-debian12) is roughly 2 MB. Distroless ships base
  images for static binaries, glibc-based binaries, C/C++, Java (17, 21, 25),
  Node.js (22, 24), and Python 3, with multi-architecture support including
  amd64, arm64, arm, s390x, ppc64le, and riscv64. Adopters include Kubernetes,
  Knative, Tekton, and Teleport.
